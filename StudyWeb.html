<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5, CSS3, JavaScript 공부 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HTML5, CSS3, JavaScript 공부</h1>
        <p id="message">이 페이지는 HTML5 구조, CSS3 스타일링, JavaScript 인터랙션을 공부하기 위한 간단한 예제입니다.</p>
        <button onclick="changeMessage()">메시지 변경</button>
    </div>

    <script>
        function changeMessage() {
            const message = document.getElementById('message');
            message.textContent = '버튼을 클릭했습니다! JavaScript가 작동합니다.';
            message.style.color = '#28a745';
        }
    </script>
</body>
</html>
